AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Todo Service

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
  CognitoUserPoolArn:
    Type: String
  DynamoTableName:
    Type: String

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 256
    Timeout: 10
    CodeUri: ../../
    Environment:
      Variables:
        DYNAMO_TABLE: !Ref DynamoTableName
        ENVIRONMENT: !Ref Environment
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

Resources:

  TodoApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref CognitoUserPoolArn
        AddDefaultAuthorizerToCorsPreflight: false

  CreateTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/todo-service/src/handlers/create-todo.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TodoApi
            Path: /todos
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/todo-service/src/handlers/create-todo.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External:
          - '@aws-sdk/client-dynamodb'
          - '@aws-sdk/lib-dynamodb'

  GetTodosFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/todo-service/src/handlers/get-todos.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TodoApi
            Path: /todos
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/todo-service/src/handlers/get-todos.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External:
          - '@aws-sdk/client-dynamodb'
          - '@aws-sdk/lib-dynamodb'

  GetTodoByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/todo-service/src/handlers/get-todo-by-id.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TodoApi
            Path: /todos/{todoId}
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/todo-service/src/handlers/get-todo-by-id.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External:
          - '@aws-sdk/client-dynamodb'
          - '@aws-sdk/lib-dynamodb'

  UpdateTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/todo-service/src/handlers/update-todo.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TodoApi
            Path: /todos/{todoId}
            Method: PUT
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/todo-service/src/handlers/update-todo.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External:
          - '@aws-sdk/client-dynamodb'
          - '@aws-sdk/lib-dynamodb'

  DeleteTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/todo-service/src/handlers/delete-todo.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TodoApi
            Path: /todos/{todoId}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/todo-service/src/handlers/delete-todo.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External:
          - '@aws-sdk/client-dynamodb'
          - '@aws-sdk/lib-dynamodb'

  ArchiveTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/todo-service/src/handlers/archive-todo.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TodoApi
            Path: /todos/{todoId}/archive
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/todo-service/src/handlers/archive-todo.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External:
          - '@aws-sdk/client-dynamodb'
          - '@aws-sdk/lib-dynamodb'

Outputs:
  TodoApiUrl:
    Value: !Sub 'https://${TodoApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${Environment}-TodoApiUrl'
