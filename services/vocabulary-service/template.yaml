AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Vocabulary Service — public read, admin write, Cambridge enrichment

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
  CognitoUserPoolArn:
    Type: String
  DynamoTableName:
    Type: String
  AudioBucketName:
    Type: String
    Default: vocmap-audio-dev

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 256
    Timeout: 30
    CodeUri: ../../
    Environment:
      Variables:
        DYNAMO_TABLE: !Ref DynamoTableName
        AUDIO_BUCKET: !Ref AudioBucketName
        ENVIRONMENT: !Ref Environment
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

Resources:

  # ── API Gateway ──────────────────────────────────────────────────────────────
  VocabularyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"
      Auth:
        # Default authorizer applies to all routes unless overridden below
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref CognitoUserPoolArn
        AddDefaultAuthorizerToCorsPreflight: false

  # ── S3 audio bucket ───────────────────────────────────────────────────────────
  AudioBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Ref AudioBucketName
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET]
            AllowedOrigins: ['*']
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  AudioBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AudioBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${AudioBucket.Arn}/*'

  # ══ PUBLIC read routes (no auth) ═════════════════════════════════════════════

  # GET /vocabulary — public search + list
  GetVocabularyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/vocabulary-service/src/handlers/get-vocabulary.handler
      Timeout: 15
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref VocabularyApi
            Path: /vocabulary
            Method: GET
            Auth:
              Authorizer: NONE   # ← public endpoint
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/vocabulary-service/src/handlers/get-vocabulary.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External: ['@aws-sdk/client-dynamodb', '@aws-sdk/lib-dynamodb']

  # GET /vocabulary/{wordKey} — public word lookup
  GetWordFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/vocabulary-service/src/handlers/get-word.handler
      Timeout: 15
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref VocabularyApi
            Path: /vocabulary/{wordKey}
            Method: GET
            Auth:
              Authorizer: NONE   # ← public endpoint
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/vocabulary-service/src/handlers/get-word.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External: ['@aws-sdk/client-dynamodb', '@aws-sdk/lib-dynamodb']

  # ══ ADMIN-ONLY write routes (Cognito + assertAdmin) ═══════════════════════════

  # POST /vocabulary/from-family/{familyId}
  SaveFamilyToVocabFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/vocabulary-service/src/handlers/save-family-to-vocab.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref VocabularyApi
            Path: /vocabulary/from-family/{familyId}
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/vocabulary-service/src/handlers/save-family-to-vocab.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External: ['@aws-sdk/client-dynamodb', '@aws-sdk/lib-dynamodb']

  # POST /vocabulary/{wordKey}/enrich
  EnrichVocabularyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/vocabulary-service/src/handlers/enrich-vocabulary.handler
      Timeout: 60
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoTableName
        - S3WritePolicy:
            BucketName: !Ref AudioBucketName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref VocabularyApi
            Path: /vocabulary/{wordKey}/enrich
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/vocabulary-service/src/handlers/enrich-vocabulary.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External: ['@aws-sdk/client-dynamodb', '@aws-sdk/lib-dynamodb', '@aws-sdk/client-s3']

Outputs:
  VocabularyApiUrl:
    Value: !Sub 'https://${VocabularyApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${Environment}-VocabularyApiUrl'

  AudioBucketUrl:
    Value: !Sub 'https://${AudioBucketName}.s3.amazonaws.com'
    Export:
      Name: !Sub '${Environment}-AudioBucketUrl'
