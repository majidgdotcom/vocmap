AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Vocabulary Service — word families + vocabulary entries

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
  CognitoUserPoolArn:
    Type: String
  DynamoTableName:
    Type: String

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 256
    Timeout: 15
    CodeUri: ../../
    Environment:
      Variables:
        DYNAMO_TABLE: !Ref DynamoTableName
        ENVIRONMENT: !Ref Environment
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

Resources:

  # ── API Gateway ──────────────────────────────────────────────────────────────
  VocabularyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref CognitoUserPoolArn
        AddDefaultAuthorizerToCorsPreflight: false

  # ══ Word-Family routes (existing) ════════════════════════════════════════════

  BatchSaveFamiliesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/vocabulary-service/src/handlers/batch-save-families.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref VocabularyApi
            Path: /word-families/batch
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/vocabulary-service/src/handlers/batch-save-families.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External: ['@aws-sdk/client-dynamodb', '@aws-sdk/lib-dynamodb']

  GetFamiliesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/vocabulary-service/src/handlers/get-families.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref VocabularyApi
            Path: /word-families
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/vocabulary-service/src/handlers/get-families.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External: ['@aws-sdk/client-dynamodb', '@aws-sdk/lib-dynamodb']

  DeleteFamilyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/vocabulary-service/src/handlers/delete-family.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref VocabularyApi
            Path: /word-families/{familyId}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/vocabulary-service/src/handlers/delete-family.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External: ['@aws-sdk/client-dynamodb', '@aws-sdk/lib-dynamodb']

  # ══ Vocabulary routes (new) ══════════════════════════════════════════════════

  SaveFamilyToVocabFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/vocabulary-service/src/handlers/save-family-to-vocab.handler
      Timeout: 30   # upsert loop can be slow for large families
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref VocabularyApi
            Path: /vocabulary/from-family/{familyId}
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/vocabulary-service/src/handlers/save-family-to-vocab.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External: ['@aws-sdk/client-dynamodb', '@aws-sdk/lib-dynamodb']

  GetVocabularyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/vocabulary-service/src/handlers/get-vocabulary.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref VocabularyApi
            Path: /vocabulary
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/vocabulary-service/src/handlers/get-vocabulary.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External: ['@aws-sdk/client-dynamodb', '@aws-sdk/lib-dynamodb']

  GetWordFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services/vocabulary-service/src/handlers/get-word.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref VocabularyApi
            Path: /vocabulary/{wordKey}
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [services/vocabulary-service/src/handlers/get-word.ts]
        Bundle: true
        Minify: false
        TreeShaking: true
        Target: es2020
        External: ['@aws-sdk/client-dynamodb', '@aws-sdk/lib-dynamodb']

Outputs:
  VocabularyApiUrl:
    Value: !Sub 'https://${VocabularyApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${Environment}-VocabularyApiUrl'
