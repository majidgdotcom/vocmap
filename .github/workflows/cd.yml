name: CD

on:
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, prod]

jobs:
  # ── Determine target environment ──────────────────────────────────────────────
  setup:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

  # ── Deploy Backend ────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    env:
      DEPLOY_ENV: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Python (SAM)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package
        run: yarn workspace @vocmap/shared build

      - name: Install esbuild
        run: npm install -g esbuild

      # ── Infrastructure (DynamoDB + Cognito + CloudWatch) ───────────────────
      # Uses aws cloudformation deploy — more reliable than sam deploy for
      # infrastructure-only stacks (no Lambda resources)
      - name: Deploy infrastructure
        working-directory: infrastructure
        run: |
          aws cloudformation deploy \
            --stack-name vocmap-infra-${{ env.DEPLOY_ENV }} \
            --template-file template.yaml \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides Environment=${{ env.DEPLOY_ENV }} \
            --no-fail-on-empty-changeset

      # ── Todo Service ────────────────────────────────────────────────────────
      - name: Build todo-service
        working-directory: services/todo-service
        run: sam build

      - name: Deploy todo-service
        working-directory: services/todo-service
        run: |
          sam deploy \
            --stack-name vocmap-todo-service-${{ env.DEPLOY_ENV }} \
            --s3-bucket ${{ secrets.SAM_S3_BUCKET }} \
            --s3-prefix todo-service \
            --region ${{ vars.AWS_REGION }} \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
              Environment=${{ env.DEPLOY_ENV }} \
              CognitoUserPoolArn=${{ secrets.COGNITO_USER_POOL_ARN }} \
              DynamoTableName=todo-app-${{ env.DEPLOY_ENV }} \
            --no-fail-on-empty-changeset

      # ── Keyword Service ─────────────────────────────────────────────────────
      - name: Build keyword-service
        working-directory: services/keyword-service
        run: sam build

      - name: Deploy keyword-service
        working-directory: services/keyword-service
        run: |
          sam deploy \
            --stack-name vocmap-keyword-service-${{ env.DEPLOY_ENV }} \
            --s3-bucket ${{ secrets.SAM_S3_BUCKET }} \
            --s3-prefix keyword-service \
            --region ${{ vars.AWS_REGION }} \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
              Environment=${{ env.DEPLOY_ENV }} \
              CognitoUserPoolArn=${{ secrets.COGNITO_USER_POOL_ARN }} \
              DynamoTableName=todo-app-${{ env.DEPLOY_ENV }} \
            --no-fail-on-empty-changeset

      - name: Print API URLs
        run: |
          echo "Todo API: $(aws cloudformation describe-stacks \
            --stack-name vocmap-todo-service-${{ env.DEPLOY_ENV }} \
            --query 'Stacks[0].Outputs[?OutputKey==`TodoApiUrl`].OutputValue' \
            --output text)"
          echo "Keyword API: $(aws cloudformation describe-stacks \
            --stack-name vocmap-keyword-service-${{ env.DEPLOY_ENV }} \
            --query 'Stacks[0].Outputs[?OutputKey==`KeywordApiUrl`].OutputValue' \
            --output text)"

  # ── Deploy Frontend ───────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [setup, deploy-backend]
    environment: ${{ needs.setup.outputs.environment }}
    env:
      DEPLOY_ENV: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: yarn build
        env:
          VITE_API_TODO_URL: ${{ vars.VITE_API_TODO_URL }}
          VITE_API_KEYWORD_URL: ${{ vars.VITE_API_KEYWORD_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_AWS_REGION: ${{ vars.AWS_REGION }}

      - name: Deploy to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ secrets.FRONTEND_S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ secrets.FRONTEND_S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── QA Gate (staging only) ────────────────────────────────────────────────────
  qa-gate:
    name: QA Smoke Tests (staging)
    runs-on: ubuntu-latest
    needs: [setup, deploy-frontend]
    if: needs.setup.outputs.environment == 'staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      # Get a JWT token via Cognito before running smoke tests
      - name: Get Cognito JWT token
        id: get-token
        run: |
          TOKEN=$(aws cognito-idp initiate-auth \
            --auth-flow USER_PASSWORD_AUTH \
            --client-id ${{ secrets.COGNITO_CLIENT_ID }} \
            --auth-parameters USERNAME=${{ secrets.TEST_USER_EMAIL }},PASSWORD=${{ secrets.TEST_USER_PASSWORD }} \
            --query 'AuthenticationResult.IdToken' \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "id_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Run smoke tests against staging
        run: yarn workspace @vocmap/todo-service test:integration
        env:
          TODO_API_URL: ${{ vars.VITE_API_TODO_URL }}
          KEYWORD_API_URL: ${{ vars.VITE_API_KEYWORD_URL }}
          TEST_ID_TOKEN: ${{ steps.get-token.outputs.id_token }}

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 Staging QA tests FAILED for commit ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
