name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Typecheck ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package
        run: yarn workspace @vocmap/shared build

      - name: Lint
        run: yarn lint

      - name: Typecheck (shared)
        run: yarn workspace @vocmap/shared typecheck

      - name: Typecheck (todo-service)
        run: yarn workspace @vocmap/todo-service typecheck

      - name: Typecheck (keyword-service)
        run: yarn workspace @vocmap/keyword-service typecheck

      - name: Typecheck (frontend)
        run: yarn workspace @vocmap/frontend typecheck

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package
        run: yarn workspace @vocmap/shared build

      - name: Run unit tests (todo-service)
        run: yarn workspace @vocmap/todo-service test:unit --coverage

      - name: Run unit tests (keyword-service)
        run: yarn workspace @vocmap/keyword-service test:unit --coverage

      - name: Run unit tests (frontend)
        run: yarn workspace @vocmap/frontend test:unit --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Build Check ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Python (for SAM CLI)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package
        run: yarn workspace @vocmap/shared build

      - name: Install esbuild
        run: npm install -g esbuild

      - name: SAM build (todo-service)
        working-directory: services/todo-service
        run: sam build

      - name: SAM build (keyword-service)
        working-directory: services/keyword-service
        run: sam build

      - name: Build frontend
        working-directory: frontend
        run: yarn build
        env:
          VITE_API_TODO_URL: ${{ vars.VITE_API_TODO_URL_DEV }}
          VITE_API_KEYWORD_URL: ${{ vars.VITE_API_KEYWORD_URL_DEV }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID_DEV }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID_DEV }}
          VITE_AWS_REGION: ${{ vars.AWS_REGION }}

  # ── Integration Tests (against dev stack) ────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      # Get a JWT token via Cognito before running tests
      - name: Get Cognito JWT token
        id: get-token
        run: |
          TOKEN=$(aws cognito-idp initiate-auth \
            --auth-flow USER_PASSWORD_AUTH \
            --client-id ${{ secrets.COGNITO_CLIENT_ID }} \
            --auth-parameters USERNAME=${{ secrets.TEST_USER_EMAIL }},PASSWORD=${{ secrets.TEST_USER_PASSWORD }} \
            --query 'AuthenticationResult.IdToken' \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "id_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Run integration tests
        run: yarn workspace @vocmap/todo-service test:integration
        env:
          TODO_API_URL: ${{ vars.VITE_API_TODO_URL_DEV }}
          KEYWORD_API_URL: ${{ vars.VITE_API_KEYWORD_URL_DEV }}
          TEST_ID_TOKEN: ${{ steps.get-token.outputs.id_token }}
