AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: VocMap - Shared Infrastructure (DynamoDB, Cognito, CloudWatch)

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Default: dev

Resources:

  # ── DynamoDB single-table ────────────────────────────────────────────────────
  VocMapTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub 'vocmap-${Environment}'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── Cognito User Pool ────────────────────────────────────────────────────────
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'vocmap-users-${Environment}'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      MfaConfiguration: 'OFF'
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub 'vocmap-web-${Environment}'
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO

  # ── Cognito User Groups ──────────────────────────────────────────────────────
  # The JWT IdToken will contain: cognito:groups: ["admin"] or ["user"]
  # Both Lambda handlers and the frontend read this claim.

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref CognitoUserPool
      Description: 'Admin users — full access to Word Families and Vocabulary dashboards'
      Precedence: 1   # lower = higher priority when a user belongs to multiple groups

  UserGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: user
      UserPoolId: !Ref CognitoUserPool
      Description: 'Regular users — user dashboard (future implementation)'
      Precedence: 2

  # ── CloudWatch Log Groups ────────────────────────────────────────────────────
  WordFamilyServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/vocmap-word-family-service-${Environment}'
      RetentionInDays: 30

  VocabularyServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/vocmap-vocabulary-service-${Environment}'
      RetentionInDays: 30

Outputs:
  DynamoTableName:
    Value: !Ref VocMapTable
    Export:
      Name: !Sub '${Environment}-DynamoTableName'
  DynamoTableArn:
    Value: !GetAtt VocMapTable.Arn
    Export:
      Name: !Sub '${Environment}-DynamoTableArn'
  CognitoUserPoolId:
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub '${Environment}-CognitoUserPoolId'
  CognitoUserPoolArn:
    Value: !GetAtt CognitoUserPool.Arn
    Export:
      Name: !Sub '${Environment}-CognitoUserPoolArn'
  CognitoClientId:
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub '${Environment}-CognitoClientId'
